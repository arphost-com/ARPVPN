components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: arpvpn_session
  schemas:
    ApiSuccessEnvelope:
      type: object
      required:
      - ok
      - request_id
      - generated_at
      - data
      properties:
        ok:
          type: boolean
          example: true
        request_id:
          type: string
          example: req-1234
        generated_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
    ApiErrorEnvelope:
      type: object
      required:
      - ok
      - request_id
      - error
      properties:
        ok:
          type: boolean
          example: false
        request_id:
          type: string
          example: req-1234
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              example: bad_request
            message:
              type: string
              example: Invalid payload.
            details:
              type: object
              additionalProperties: true
    api_accept_invitationRequest:
      type: object
      properties:
        token:
          type: string
          example: invite-token
        username:
          type: string
          example: client1
        password:
          type: string
          example: change-me
        confirm:
          type: string
          example: change-me
      additionalProperties: false
      required:
      - token
      - username
      - password
      - confirm
      example:
        token: invite-token
        username: client1
        password: change-me
        confirm: change-me
    api_auth_issue_tokenRequest:
      type: object
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: change-me
        scope:
          type: string
          example: staff
        mfa_code:
          type: string
          example: '123456'
      additionalProperties: false
      required:
      - username
      - password
      example:
        username: admin
        password: change-me
        scope: staff
        mfa_code: '123456'
    api_auth_refresh_tokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
          example: refresh-token
      additionalProperties: false
      required:
      - refresh_token
      example:
        refresh_token: refresh-token
    api_auth_revoke_all_tokensRequest:
      type: object
      properties:
        user_id:
          type: string
          example: user-123
      additionalProperties: false
      example:
        user_id: user-123
    api_auth_revoke_tokenRequest:
      type: object
      properties:
        token:
          type: string
          example: access-token
      additionalProperties: false
      example:
        token: access-token
    api_create_invitationRequest:
      type: object
      properties:
        email:
          type: string
          example: client@example.com
        role:
          type: string
          enum:
          - client
          - tenant_admin
          - admin
          - support
          example: client
        tenant_id:
          type: string
          example: tenant-123
        expires_in_hours:
          type: integer
          example: 72
      additionalProperties: false
      required:
      - email
      example:
        email: client@example.com
        role: client
        tenant_id: tenant-123
        expires_in_hours: 72
    api_create_tenantRequest:
      type: object
      properties:
        name:
          type: string
          example: Tenant One
        slug:
          type: string
          example: tenant-one
        domains:
          oneOf:
          - type: string
          - type: array
            items:
              type: string
          example:
          - example
        ips:
          oneOf:
          - type: string
          - type: array
            items:
              type: string
          example:
          - example
        status:
          type: string
          enum:
          - active
          - suspended
          - disabled
          example: active
        description:
          type: string
          example: Managed customer
        settings:
          type: object
          properties:
            branding:
              type: object
              properties: {}
              additionalProperties: true
              example: *id006
            limits:
              type: object
              properties: {}
              additionalProperties: true
              example: *id007
            defaults:
              type: object
              properties: {}
              additionalProperties: true
              example: *id008
            dns_servers:
              oneOf:
              - type: string
              - type: array
                items:
                  type: string
              example:
              - example
            tls:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                  - http
                  - self_signed
                  - letsencrypt
                  - reverse_proxy
                  example: self_signed
                server_name:
                  type: string
                  example: tenant.example.com
                letsencrypt_email:
                  type: string
                  example: admin@example.com
                redirect_http_to_https:
                  type: boolean
