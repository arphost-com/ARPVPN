openapi: 3.0.3
info:
  title: ARPVPN API
  version: "2.0.2"
  description: >
    Source-of-truth OpenAPI document for ARPVPN v1 API endpoints.
servers:
  - url: /api/v1
    description: ARPVPN v1 API
tags:
  - name: Auth
  - name: Mesh
  - name: Stats
  - name: System
  - name: TLS
  - name: Tenants
paths:
  /api/v1/auth/token:
    post:
      tags: [Auth]
      operationId: issueApiToken
      summary: Issue bearer access/refresh tokens.
      description: >
        Used by external clients or browser automation. Example roles:
        `super_admin` and `support_admin` request `staff`, `tenant_admin` requests `staff`,
        and `client` requests `client`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                scope:
                  type: string
                  enum: [all, staff, client]
            examples:
              tenantAdmin:
                summary: Tenant admin requesting staff-scoped token
                value:
                  username: tenant-admin
                  password: change-me
                  scope: staff
      responses:
        "201":
          description: Token pair issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
              examples:
                issued:
                  value:
                    ok: true
                    request_id: 8d8d0c1f
                    generated_at: "2026-03-10T18:30:00Z"
                    data:
                      token_type: Bearer
                      scope: staff
                      access_token: token-id.token-secret
                      refresh_token: refresh-id.refresh-secret
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
        "429":
          description: Auth lockout/rate limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/auth/csrf:
    get:
      tags: [Auth]
      operationId: getApiCsrfToken
      summary: Get a CSRF token for cookie-authenticated API mutations.
      description: >
        Required for same-origin browser/API requests that rely on the Flask session cookie.
        Bearer-token API requests do not require this header.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: CSRF token metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
              examples:
                cookieCsrf:
                  value:
                    ok: true
                    request_id: 701aa3f1
                    generated_at: "2026-03-10T18:31:00Z"
                    data:
                      csrf_token: ImFiYzEyMyI.aBcDef.ghijk
                      required_for_cookie_auth: true
                      header_names: ["X-CSRFToken", "X-CSRF-Token"]
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshApiToken
      summary: Rotate refresh token and issue a new token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token pair refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
        "401":
          description: Invalid refresh token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/auth/revoke:
    post:
      tags: [Auth]
      operationId: revokeApiToken
      summary: Revoke a single token.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/auth/revoke-all:
    post:
      tags: [Auth]
      operationId: revokeAllApiTokens
      summary: Revoke all active tokens for the current user (or a specified user if staff).
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
      responses:
        "200":
          description: Tokens revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/auth/force-logout/{user_id}:
    post:
      tags: [Auth]
      operationId: forceLogoutUser
      summary: Force logout and token revocation for a user (staff only).
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User forced out.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/mesh/overview:
    get:
      tags: [Mesh]
      operationId: getMeshOverview
      summary: Get mesh overview and conflict summary.
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Mesh overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/mesh/topologies:
    get:
      tags: [Mesh]
      operationId: listMeshTopologies
      summary: List mesh topologies (staff).
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Topology list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
    post:
      tags: [Mesh]
      operationId: createMeshTopology
      summary: Create a mesh topology (staff).
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                preset:
                  type: string
                  enum: [point_to_point, hub_spoke, full_mesh]
                server_ids:
                  type: array
                  items:
                    type: string
                hub_server_id:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Topology created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/mesh/dry-run:
    post:
      tags: [Mesh]
      operationId: dryRunMeshPlan
      summary: Validate mesh payload before apply/import.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mesh:
                  type: object
      responses:
        "200":
          description: Validation summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/stats/overview:
    get:
      tags: [Stats]
      operationId: getStatsOverview
      summary: Read live WireGuard overview data.
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Stats overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/system/backup:
    get:
      tags: [System]
      operationId: exportSystemBackup
      summary: Export an admin-only backup snapshot.
      description: >
        Returns base64-encoded backup content for config, credentials, tenants, and invitations.
        Intended for super-admin disaster recovery and migration workflows.
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: Backup snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
              examples:
                backup:
                  value:
                    ok: true
                    request_id: 9fd2f67c
                    generated_at: "2026-03-10T18:32:00Z"
                    data:
                      format: arpvpn-backup-v1
                      files:
                        config:
                          exists: true
                          size_bytes: 2048
                          sha256: abc123
                          content_b64: ZXhhbXBsZQ==
        "403":
          description: Only super admin can export backups.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/system/restore:
    post:
      tags: [System]
      operationId: restoreSystemBackup
      summary: Restore a backup snapshot.
      description: >
        Admin-only restore endpoint with idempotency support. Use `dry_run=true` to validate the
        backup bundle without applying it.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run:
                  type: boolean
                backup:
                  type: object
            examples:
              dryRun:
                value:
                  dry_run: true
                  backup:
                    format: arpvpn-backup-v1
                    files:
                      config:
                        exists: true
                        content_b64: ZXhhbXBsZQ==
      responses:
        "200":
          description: Backup validated or restored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/tls/mode:
    post:
      tags: [TLS]
      operationId: updateGlobalTlsMode
      summary: Update global ARPVPN TLS mode.
      description: Super-admin only. Support users remain read-only for global TLS status.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [http, self_signed, letsencrypt, reverse_proxy]
                server_name:
                  type: string
                letsencrypt_email:
                  type: string
                proxy_incoming_hostname:
                  type: string
                redirect_http_to_https:
                  type: boolean
            examples:
              selfSigned:
                value:
                  mode: self_signed
                  server_name: vpn.example.test
                  redirect_http_to_https: true
      responses:
        "200":
          description: Updated global TLS state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
        "403":
          description: Only super admin can change global TLS.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/tenants/{tenant_id}/tls/status:
    get:
      tags: [Tenants, TLS]
      operationId: getTenantTlsStatus
      summary: Read tenant-scoped TLS settings.
      description: Tenant admins can read only their own tenant. Support and super admin can inspect any tenant.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: tenant_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant TLS status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/tenants/{tenant_id}/tls:
    put:
      tags: [Tenants, TLS]
      operationId: updateTenantTlsStatus
      summary: Update tenant-scoped TLS settings.
      description: >
        Tenant admins can update only their assigned tenant. Settings are stored for tenant-scoped
        deployments and separate tenant runtime stacks.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: tenant_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [http, self_signed, letsencrypt, reverse_proxy]
                server_name:
                  type: string
                letsencrypt_email:
                  type: string
                proxy_incoming_hostname:
                  type: string
                redirect_http_to_https:
                  type: boolean
            examples:
              tenantLetsEncrypt:
                value:
                  mode: letsencrypt
                  server_name: tenant-a.example.test
                  letsencrypt_email: ops@example.test
                  redirect_http_to_https: true
      responses:
        "200":
          description: Tenant TLS settings stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
        "403":
          description: Insufficient permissions or wrong tenant scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
  /api/v1/tenants/{tenant_id}/runtime:
    get:
      tags: [Tenants]
      operationId: getTenantRuntime
      summary: Read tenant runtime allocation and status.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: tenant_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant runtime metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
    put:
      tags: [Tenants]
      operationId: updateTenantRuntime
      summary: Update tenant runtime allocation and desired state.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: tenant_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                http_port:
                  type: integer
                https_port:
                  type: integer
                vpn_port:
                  type: integer
                container_name:
                  type: string
                compose_project_name:
                  type: string
                desired_state:
                  type: string
                  enum: [running, stopped, restarting]
            examples:
              runtimeUpdate:
                value:
                  http_port: 18085
                  https_port: 18086
                  vpn_port: 51820
                  container_name: arpvpn-tenant-one
                  compose_project_name: arpvpn_tenant_one
                  desired_state: running
      responses:
        "200":
          description: Tenant runtime updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/tenants/{tenant_id}/runtime/allocate:
    post:
      tags: [Tenants]
      operationId: allocateTenantRuntime
      summary: Allocate a default runtime port set for a tenant.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: tenant_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime ports allocated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
  /api/v1/tenants/{tenant_id}/runtime/{action}:
    post:
      tags: [Tenants]
      operationId: controlTenantRuntime
      summary: Update the requested runtime action for a tenant stack.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: tenant_id
          required: true
          schema:
            type: string
        - in: path
          name: action
          required: true
          schema:
            type: string
            enum: [start, stop, restart]
      responses:
        "200":
          description: Requested runtime action stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccessEnvelope"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Opaque
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
  schemas:
    ApiSuccessEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        request_id:
          type: string
        generated_at:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
    ApiErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        request_id:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
