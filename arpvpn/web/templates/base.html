<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="ARPVPN: WireGuard management with client and site-to-site support." />
        <meta name="author" content="José Antonio Mazón San Bartolomé" />
        <meta name="theme-color" content="#0e1727" />

        {% block additional_metas %}
        {% endblock %}

        <title>
            {{ app_name }} | {{ title }}
        </title>

        <script>
            (function () {
                const key = "arpvpn.theme";
                let value = "auto";
                try {
                    value = localStorage.getItem(key) || "auto";
                } catch (e) {}
                const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
                const resolved = value === "auto" ? (prefersDark ? "dark" : "light") : value;
                document.documentElement.setAttribute("data-theme", resolved);
                document.documentElement.setAttribute("data-theme-choice", value);
            })();
        </script>

        <link href="/static/css/styles.css" rel="stylesheet" />

        {% block additional_styles %}
        {% endblock %}

        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/js/all.min.js" crossorigin="anonymous"></script>
        {% block additional_prioritary_scripts %}
        {% endblock %}
    </head>
    <body>
        {% block body_content %}
        {% endblock %}

        {% block footer %}
        {% endblock %}

        {% block scripts %}
        {% endblock %}
    </body>
</html>
