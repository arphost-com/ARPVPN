stages:
  - package
  - container

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

package_dist:
  stage: package
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir poetry==1.8.3
  script:
    - rm -rf dist
    - ./build.sh
  artifacts:
    paths:
      - dist/*.tar.gz
    expire_in: 1 day

docker_publish:
  stage: container
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
      alias: docker
      command:
        - "--tls=false"
        - "--insecure-registry=10.10.10.96:5050"
  needs:
    - package_dist
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "http://$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker build -f docker/Dockerfile -t "$CI_REGISTRY_IMAGE:stable" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:stable"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
