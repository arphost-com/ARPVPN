default:
  tags:
    - docker02

stages:
  - test
  - package
  - container

.poetry_job_setup: &poetry_job_setup
  - apt-get update
  - apt-get install -y --no-install-recommends iproute2
  - rm -rf /var/lib/apt/lists/*
  - rm -rf .ci-venv
  - python3 -m venv .ci-venv
  - . .ci-venv/bin/activate
  - pip install --no-cache-dir poetry==1.8.3
  - poetry config virtualenvs.create false
  - poetry install --with dev --no-interaction --no-ansi

.poetry_package_setup: &poetry_package_setup
  - rm -rf .ci-venv
  - python3 -m venv .ci-venv
  - . .ci-venv/bin/activate
  - pip install --no-cache-dir poetry==1.8.3

unit_tests:
  stage: test
  image: python:3.11-slim
  before_script: *poetry_job_setup
  script:
    - |
      python3 scripts/validate_openapi.py
    - |
      ./scripts/check_api_artifacts.sh
    - |
      pytest -q \
        arpvpn/tests/test_server.py \
        arpvpn/tests/default/test_setup.py \
        arpvpn/tests/default/test_about_page.py \
        arpvpn/tests/default/test_login.py \
        arpvpn/tests/default/test_profile.py \
        arpvpn/tests/default/test_password_reset.py \
        arpvpn/tests/default/test_theme_api.py \
        arpvpn/tests/default/test_statistics_page.py \
        arpvpn/tests/default/test_statistics_api.py \
        arpvpn/tests/default/test_tls_api.py \
        arpvpn/tests/default/test_https_redirect.py \
        arpvpn/tests/default/test_traffic_driver.py \
        arpvpn/tests/default/test_interface_state.py \
        arpvpn/tests/default/test_wireguard_utils.py \
        arpvpn/tests/default/test_rrd_graph_generation.py \
        arpvpn/tests/default/test_mesh_phase1.py \
        arpvpn/tests/default/test_mesh_planner.py \
        arpvpn/tests/default/test_mesh_api.py \
        arpvpn/tests/default/test_mesh_ui.py \
        arpvpn/tests/default/test_api_auth.py \
        arpvpn/tests/default/test_api_feature_flags.py \
        arpvpn/tests/default/test_api_schema_registry.py \
        arpvpn/tests/default/test_api_ui_parity.py \
        arpvpn/tests/default/test_system_api.py \
        arpvpn/tests/default/test_tenant_user_invitation_api.py \
        arpvpn/tests/default/test_users_roles.py::test_admin_can_create_client_user \
        arpvpn/tests/default/test_users_roles.py::test_admin_can_edit_user_name_role_and_password \
        arpvpn/tests/default/test_users_roles.py::test_admin_can_delete_client_user \
        arpvpn/tests/default/test_users_roles.py::test_admin_cannot_delete_own_account \
        arpvpn/tests/default/test_users_roles.py::test_support_can_impersonate_client_and_return \
        arpvpn/tests/default/test_users_roles.py::test_support_can_edit_client_but_cannot_promote_role \
        arpvpn/tests/default/test_users_roles.py::test_support_cannot_delete_admin_user \
        arpvpn/tests/default/test_users_roles.py::test_client_forbidden_on_staff_routes \
        arpvpn/tests/default/test_users_roles.py::test_support_cannot_create_admin_or_support

integration_tests_env:
  stage: test
  image: python:3.11-slim
  allow_failure: true
  before_script: *poetry_job_setup
  script:
    - |
      pytest -q arpvpn/tests
  rules:
    - if: '$RUN_ENV_INTEGRATION_TESTS == "1"'
    - when: never

api_contract_tests:
  stage: test
  image: python:3.11-slim
  allow_failure: true
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends iproute2
    - rm -rf /var/lib/apt/lists/*
    - rm -rf .ci-venv
    - python3 -m venv .ci-venv
    - . .ci-venv/bin/activate
    - pip install --no-cache-dir poetry==1.8.3
    - poetry config virtualenvs.create false
    - poetry install --with dev --no-interaction --no-ansi
    - chmod +x scripts/run-api-contract-tests.sh
  script:
    - ./scripts/run-api-contract-tests.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

package_dist:
  stage: package
  image: python:3.11-slim
  before_script: *poetry_package_setup
  needs:
    - unit_tests
  script:
    - rm -rf dist
    - ./build.sh
  artifacts:
    paths:
      - dist/*.tar.gz
    expire_in: 1 day

docker_publish:
  stage: container
  image: docker:27.1.1
  needs:
    - unit_tests
    - package_dist
  script:
    - unset DOCKER_HOST
    - unset DOCKER_TLS_CERTDIR
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - |
      set -euo pipefail
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        docker build --build-arg ARPVPN_UID=1000 --build-arg ARPVPN_GID=1000 -f docker/Dockerfile \
          -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" \
          -t "$CI_REGISTRY_IMAGE:latest" \
          -t "$CI_REGISTRY_IMAGE:2.x" \
          .
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      else
        docker build --build-arg ARPVPN_UID=1000 --build-arg ARPVPN_GID=1000 -f docker/Dockerfile \
          -t "$CI_REGISTRY_IMAGE:latest" \
          -t "$CI_REGISTRY_IMAGE:2.x" \
          -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" \
          .
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      fi
    - docker push "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:2.x"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v2\./'
