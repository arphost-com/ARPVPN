stages:
  - test
  - package
  - container

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

unit_tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir poetry==1.8.3
    - poetry config virtualenvs.create false
    - poetry install --with dev --no-interaction --no-ansi
  script:
    - |
      # Run deterministic unit tests on generic CI runners.
      # Integration-style tests that require host WireGuard/network tooling run separately on ops hosts.
      pytest -q \
        arpvpn/tests/test_server.py \
        arpvpn/tests/default/test_setup.py \
        arpvpn/tests/default/test_login.py \
        arpvpn/tests/default/test_profile.py \
        arpvpn/tests/default/test_password_reset.py \
        arpvpn/tests/default/test_theme_api.py \
        arpvpn/tests/default/test_statistics_page.py \
        arpvpn/tests/default/test_statistics_api.py \
        arpvpn/tests/default/test_https_redirect.py \
        arpvpn/tests/default/test_traffic_driver.py \
        arpvpn/tests/default/test_wireguard_utils.py \
        arpvpn/tests/default/test_users_roles.py::test_admin_can_create_client_user \
        arpvpn/tests/default/test_users_roles.py::test_support_can_impersonate_client_and_return \
        arpvpn/tests/default/test_users_roles.py::test_client_forbidden_on_staff_routes \
        arpvpn/tests/default/test_users_roles.py::test_support_cannot_create_admin_or_support

integration_tests_env:
  stage: test
  image: python:3.11-slim
  allow_failure: true
  before_script:
    - pip install --no-cache-dir poetry==1.8.3
    - poetry config virtualenvs.create false
    - poetry install --with dev --no-interaction --no-ansi
  script:
    - |
      # Full environment/integration suite (requires WireGuard/network tooling on runner host).
      pytest -q arpvpn/tests
  rules:
    - if: '$RUN_ENV_INTEGRATION_TESTS == "1"'
    - when: never

package_dist:
  stage: package
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir poetry==1.8.3
  needs:
    - unit_tests
  script:
    - rm -rf dist
    - ./build.sh
  artifacts:
    paths:
      - dist/*.tar.gz
    expire_in: 1 day

docker_publish_v1:
  stage: container
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
      alias: docker
      command:
        - "--tls=false"
        - "--insecure-registry=10.10.10.96:5050"
  needs:
    - unit_tests
    - package_dist
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "http://$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - |
      set -euo pipefail
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        docker build --build-arg ARPVPN_UID=1000 --build-arg ARPVPN_GID=1000 -f docker/Dockerfile \
          -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" \
          -t "$CI_REGISTRY_IMAGE:stable" \
          -t "$CI_REGISTRY_IMAGE:1.2.x" \
          .
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      else
        docker build --build-arg ARPVPN_UID=1000 --build-arg ARPVPN_GID=1000 -f docker/Dockerfile \
          -t "$CI_REGISTRY_IMAGE:stable" \
          -t "$CI_REGISTRY_IMAGE:1.2.x" \
          -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" \
          .
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      fi
    - docker push "$CI_REGISTRY_IMAGE:stable"
    - docker push "$CI_REGISTRY_IMAGE:1.2.x"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v1\./'

docker_publish_v2:
  stage: container
  image: docker:27.1.1
  services:
    - name: docker:27.1.1-dind
      alias: docker
      command:
        - "--tls=false"
        - "--insecure-registry=10.10.10.96:5050"
  needs:
    - unit_tests
    - package_dist
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "http://$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - |
      set -euo pipefail
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        docker build --build-arg ARPVPN_UID=1000 --build-arg ARPVPN_GID=1000 -f docker/Dockerfile \
          -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" \
          -t "$CI_REGISTRY_IMAGE:v2-latest" \
          .
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      else
        docker build --build-arg ARPVPN_UID=1000 --build-arg ARPVPN_GID=1000 -f docker/Dockerfile \
          -t "$CI_REGISTRY_IMAGE:v2-latest" \
          -t "$CI_REGISTRY_IMAGE:v2-$CI_COMMIT_SHORT_SHA" \
          .
        docker push "$CI_REGISTRY_IMAGE:v2-$CI_COMMIT_SHORT_SHA"
      fi
    - docker push "$CI_REGISTRY_IMAGE:v2-latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "codex/multitenant-v2"'
    - if: '$CI_COMMIT_TAG =~ /^v2\./'
