services:
  arpvpn:
    image: "${ARPVPN_IMAGE:-arpvpn:local}"
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ARPVPN_UID: "${ARPVPN_UID:-1000}"
        ARPVPN_GID: "${ARPVPN_GID:-1000}"
    container_name: "${ARPVPN_CONTAINER_NAME:-arpvpn}"
    # Run as the image's application user by default (preserves sudo policy
    # needed by WireGuard commands invoked by the UI).
    user: "${ARPVPN_RUNTIME_USER:-arpvpn}"
    environment:
      # Cookie suffix and runtime diagnostics.
      ARPVPN_CONTAINER_NAME: "${ARPVPN_CONTAINER_NAME:-arpvpn}"
      ARPVPN_COOKIE_SUFFIX: "${ARPVPN_COOKIE_SUFFIX:-}"
      # Use 0 to allow HTTP + HTTPS mixed access when redirect is disabled.
      # Set to 1 to force secure cookies in strict HTTPS environments.
      ARPVPN_SECURE_COOKIES: "${ARPVPN_SECURE_COOKIES:-0}"
      # HTTP bind port inside the container (host network mode uses this directly).
      ARPVPN_HTTP_PORT: "${ARPVPN_HTTP_PORT:-8085}"
      # HTTPS bind port inside the container (when TLS mode is enabled).
      ARPVPN_HTTPS_PORT: "${ARPVPN_HTTPS_PORT:-8086}"
      ARPVPN_SESSION_COOKIE_NAME: "${ARPVPN_SESSION_COOKIE_NAME:-}"
      ARPVPN_REMEMBER_COOKIE_NAME: "${ARPVPN_REMEMBER_COOKIE_NAME:-}"
      ARPVPN_HIGH_TRAFFIC_THRESHOLD_MB: "${ARPVPN_HIGH_TRAFFIC_THRESHOLD_MB:-1024}"
      ARPVPN_RRD_GRAPH_CACHE_TTL_SECONDS: "${ARPVPN_RRD_GRAPH_CACHE_TTL_SECONDS:-10800}"
      ARPVPN_LOG_DIAGNOSTICS_CACHE_TTL_SECONDS: "${ARPVPN_LOG_DIAGNOSTICS_CACHE_TTL_SECONDS:-5}"
      ARPVPN_LOG_DIAGNOSTICS_READ_BLOCK_BYTES: "${ARPVPN_LOG_DIAGNOSTICS_READ_BLOCK_BYTES:-65536}"
      ARPVPN_API_ACCESS_TTL_SECONDS: "${ARPVPN_API_ACCESS_TTL_SECONDS:-900}"
      ARPVPN_API_REFRESH_TTL_SECONDS: "${ARPVPN_API_REFRESH_TTL_SECONDS:-86400}"
      ARPVPN_API_AUTH_WINDOW_SECONDS: "${ARPVPN_API_AUTH_WINDOW_SECONDS:-60}"
      ARPVPN_API_AUTH_MAX_ATTEMPTS: "${ARPVPN_API_AUTH_MAX_ATTEMPTS:-8}"
      ARPVPN_API_AUTH_LOCKOUT_SECONDS: "${ARPVPN_API_AUTH_LOCKOUT_SECONDS:-300}"
      ARPVPN_API_RATE_LIMIT_WINDOW_SECONDS: "${ARPVPN_API_RATE_LIMIT_WINDOW_SECONDS:-60}"
      ARPVPN_API_RATE_LIMIT_MAX_REQUESTS: "${ARPVPN_API_RATE_LIMIT_MAX_REQUESTS:-120}"
      ARPVPN_FEATURE_API_AUTH: "${ARPVPN_FEATURE_API_AUTH:-1}"
      ARPVPN_FEATURE_API_STATS: "${ARPVPN_FEATURE_API_STATS:-1}"
      ARPVPN_FEATURE_API_SYSTEM: "${ARPVPN_FEATURE_API_SYSTEM:-1}"
      ARPVPN_FEATURE_API_TLS: "${ARPVPN_FEATURE_API_TLS:-1}"
      ARPVPN_FEATURE_API_CONFIG: "${ARPVPN_FEATURE_API_CONFIG:-1}"
      ARPVPN_FEATURE_API_TENANTS: "${ARPVPN_FEATURE_API_TENANTS:-1}"
      ARPVPN_FEATURE_API_WIREGUARD: "${ARPVPN_FEATURE_API_WIREGUARD:-1}"
      ARPVPN_AUDIT_SIGNING_KEY: "${ARPVPN_AUDIT_SIGNING_KEY:-}"
      ARPVPN_TENANT_RUNTIME_PORT_STRIDE: "${ARPVPN_TENANT_RUNTIME_PORT_STRIDE:-10}"
      ARPVPN_TENANT_RUNTIME_HTTP_BASE: "${ARPVPN_TENANT_RUNTIME_HTTP_BASE:-18085}"
      ARPVPN_TENANT_RUNTIME_HTTPS_BASE: "${ARPVPN_TENANT_RUNTIME_HTTPS_BASE:-18086}"
      ARPVPN_TENANT_RUNTIME_VPN_BASE: "${ARPVPN_TENANT_RUNTIME_VPN_BASE:-51820}"
      ARPVPN_REPOSITORY_URL: "${ARPVPN_REPOSITORY_URL:-}"
      ARPVPN_LICENSE_URL: "${ARPVPN_LICENSE_URL:-}"
    # Compatibility startup path: works with both old and new images by avoiding legacy
    # entrypoint chown/sudo behavior and forcing runtime data path to /data.
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        if [ ! -w /data ]; then
          echo "ERROR: /data is not writable by runtime user UID:GID $(id -u):$(id -g)."
          echo "Fix DATA_FOLDER ownership/permissions for this container user."
          ls -ld /data || true
          exit 1
        fi
        # Fail fast if UI WireGuard commands cannot elevate as expected.
        if ! sudo -n /usr/bin/wg genkey >/dev/null 2>&1; then
          echo "ERROR: WireGuard command preflight failed."
          echo "Runtime user $(id -u):$(id -g) cannot execute: sudo -n /usr/bin/wg genkey"
          echo "Use ARPVPN_RUNTIME_USER=arpvpn, or rebuild image with matching ARPVPN_UID/ARPVPN_GID."
          getent passwd "$(id -u)" || true
          exit 1
        fi
        if [ ! -f /data/uwsgi.yaml ] && [ -d /var/www/arpvpn/data ]; then
          if find /var/www/arpvpn/data -mindepth 1 -maxdepth 1 | read -r _; then
            cp -r /var/www/arpvpn/data/. /data/
          fi
        fi
        if [ -f /data/uwsgi.yaml ]; then
          sed -i -E 's|^([[:space:]]*pyargv:)[[:space:]]*data[[:space:]]*$|\1 /data|' /data/uwsgi.yaml || true
          sed -i -E "s|^([[:space:]]*http-socket:)[[:space:]]*0\\.0\\.0\\.0:[0-9]+[[:space:]]*$|\\1 0.0.0.0:$${ARPVPN_HTTP_PORT}|" /data/uwsgi.yaml || true
          sed -i -E "s|^([[:space:]]*https-socket:)[[:space:]]*0\\.0\\.0\\.0:[0-9]+(,.*)$|\\1 0.0.0.0:$${ARPVPN_HTTPS_PORT}\\2|" /data/uwsgi.yaml || true
        fi
        exec /usr/bin/uwsgi --yaml /data/uwsgi.yaml
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - type: bind
        source: "${DATA_FOLDER:-/srv/arpvpn/data}"  # Optional, provides a way to see and edit the configuration files directly from the host.
        target: /data
        bind:
          create_host_path: true
    network_mode: host
    restart: unless-stopped
